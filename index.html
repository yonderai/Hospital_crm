<!DOCTYPE html>
<html>
<head>
  <title>Clinical Insight</title>
</head>
<body>
  <h2>AI Clinical Insight</h2>

  <textarea id="symptoms" placeholder="Symptoms" style="width: 300px; height: 100px;"></textarea><br><br>
  <textarea id="history" placeholder="Medical History" style="width: 300px; height: 100px;"></textarea><br><br>
  <textarea id="medications" placeholder="Medications" style="width: 300px; height: 100px;"></textarea><br><br>

  <button onclick="sendData()" style="padding: 10px 20px;">Generate Insight</button>

  <pre id="output" style="background: #f4f4f4; padding: 15px; margin-top: 20px; white-space: pre-wrap;"></pre>

  <script>
    async function sendData() {
      const symptoms = document.getElementById("symptoms").value;
      const history = document.getElementById("history").value;
      const medications = document.getElementById("medications").value;
      
      const outputDiv = document.getElementById("output");
      outputDiv.innerText = "Generating insight...";

      try {
        const response = await fetch("http://127.0.0.1:5001/api/clinical-insight", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            symptoms,
            history,
            medications
          })
        });

        const data = await response.json();
        outputDiv.innerText = data.insight || JSON.stringify(data, null, 2);
      } catch (error) {
        outputDiv.innerText = "Error: " + error.message;
      }
    }
  </script>
</body>
</html>
